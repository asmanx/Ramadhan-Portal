<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadhan Portal - Tracker Zikir</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(15, 81, 50, 0.85), rgba(15, 81, 50, 0.85)),
                url("https://images.unsplash.com/photo-1584551246679-0daf3d275d0f?auto=format&fit=crop&w=1400&q=80");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background: linear-gradient(135deg, #0f5132, #1a5d3b);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border-bottom: 3px solid #d4af37;
            width: 100%;
            box-sizing: border-box;
            z-index: 1000;
        }

        .header-full {
            margin-bottom: 10px;
        }

        .logo {
            background-image: url('img/logo-ramadhan.png');
            background-size: cover;
            background-position: center;
            height: 90px;
            width: 90px;
            border-radius: 50%;
            background-color: white;
            border: 3px solid #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            margin-bottom: 10px;
        }

        .judul-header h2 {
            color: #fff;
            font-size: 28px;
            margin: 0;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .menu {
            display: none;
            font-size: 30px;
            cursor: pointer;
            position: absolute;
            left: 25px;
            top: 25px;
            color: white;
            transition: 0.3s;
            z-index: 2001;
        }

        .button-navigasi {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            transition: all 0.4s ease;
        }

        .nav-item {
            color: #fff;
            border-radius: 25px;
            padding: 10px 25px;
            text-decoration: none;
            border: 1px solid rgba(255, 193, 7, 0.5);
            background: rgba(255, 255, 255, 0.05);
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            background: #ffc107;
            color: #0f5132;
            border-color: #ffc107;
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.3);
            transform: translateY(-2px);
            font-weight: bold;
        }

        .nav-container {
            display: flex;
            justify-content: center;
            margin-top: 0px;
            margin-bottom: 20px;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px;
            border-radius: 30px;
            display: flex;
            gap: 5px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .nav-item-zikir {
            color: #fff;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-item-zikir.active {
            background: #d4af37;
            color: #0f5132;
            font-weight: bold;
        }

        .container {
            flex: 1;
            max-width: 500px;
            margin: 20px auto 40px;
            padding: 30px 20px;
            width: 90%;
            text-align: center;
            background: rgba(255, 255, 255, 0.98);
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            border-radius: 10px;
            border-top: 6px solid #d4af37;
            color: #333;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
        }

        .counter-display {
            font-size: 80px;
            font-weight: 700;
            color: #0f5132;
            margin: 20px 0;
            font-family: 'Courier New', Courier, monospace;
            background: #f0f0f0;
            border-radius: 15px;
            padding: 15px;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .notification {
            display: none;
            background: #27ae60;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        .set-target {
            margin-bottom: 25px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        input[type="number"] {
            width: 120px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
        }

        #setTargetBtn {
            background: #0f5132;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        .button-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .btn-add {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #0f5132, #1a5d3b);
            color: white;
            font-size: 60px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-add:active {
            transform: scale(0.92);
        }

        .btn-reset {
            background: #ffc107;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        footer {
            width: 100%;
            background: #0a3d25;
            padding: 30px 0;
            text-align: center;
            border-top: 4px solid #d4af37;
            margin-top: auto;
        }

        .footer-inner {
            padding: 0 20px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* --- MOBILE --- */
        @media(max-width:768px) {
            .menu {
                display: block;
            }

            .button-navigasi {
                display: none;
                flex-direction: column;
                background: #ffffff;
                width: 100%;
                position: absolute;
                top: 100%;
                left: 0;
                padding: 10px 0;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
                z-index: 2000;
                gap: 0;
            }

            .button-navigasi.show {
                display: flex;
            }

            .nav-item {
                color: #0f5132;
                border: none;
                background: transparent;
                border-radius: 0;
                padding: 15px 25px;
                text-align: left;
                border-bottom: 1px solid #eee;
            }

            .nav-item.active {
                background: #e8f5e9;
                color: #0f5132;
                border-left: 5px solid #0f5132;
            }

            .navbar {
                flex-wrap: wrap;
                justify-content: center;
                border-radius: 15px;
            }
        }
    </style>
</head>

<body>

    <header class="header-full">
        <div class="menu" onclick="toggleMenu()">☰</div>
        <div class="logo"></div>
        <div class="judul-header">
            <h2>RAMADHAN PORTAL</h2>
        </div>

        <div id="navMenu" class="button-navigasi">
            <a href="index.html" class="nav-item">Doa Puasa</a>
            <a href="zikir.html" class="nav-item active">Hitung Zikir</a>
            <a href="zakat.html" class="nav-item">Kalkulator Zakat</a>
            <a href="imsak.html" class="nav-item">Jadwal Imsakiyah</a>
            <a href="to-do-list.html" class="nav-item">To-Do-List</a>
        </div>
    </header>

    <main class="container">
        <div class="notification" id="notification">Maa Shaa Allah, Target Tercapai! ✨</div>
        <h2 style="margin:0; color: #0f5132;">Zikir Counter</h2>
        <div class="subtitle" style="color:#666; font-size: 14px; margin-bottom: 10px;">Ketuk tombol besar untuk
            menghitung</div>

        <div class="counter-display" id="counter">0</div>

        <div class="set-target">
            <div style="font-weight: bold; margin-bottom: 10px; color: #0f5132;">
                Target: <span id="targetDisplay">0</span>
            </div>
            <input type="number" id="targetInput" placeholder="Isi target"> <br>
            <button id="setTargetBtn">Set Target</button>
        </div>

        <div class="button-wrapper">
            <button class="btn-add" id="addBtn">+</button>
            <button class="btn-reset" id="resetBtn">Reset</button>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <p style="margin: 0; font-weight: bold;">&copy; 2026 Ramadhan Portal</p>
            <p style="margin: 5px 0 0; font-size: 0.8rem; opacity: 0.6;">Menemani Ibadah Ramadhan Anda</p>
        </div>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById("navMenu").classList.toggle("show");
        }

        let count = 0;
        let target = 0;

        const counterDisplay = document.getElementById("counter");
        const targetDisplay = document.getElementById("targetDisplay");
        const targetInput = document.getElementById("targetInput");
        const setTargetBtn = document.getElementById("setTargetBtn");
        const addBtn = document.getElementById("addBtn");
        const resetBtn = document.getElementById("resetBtn");
        const notification = document.getElementById("notification");

        setTargetBtn.addEventListener("click", function () {
            const newTarget = parseInt(targetInput.value);
            if (newTarget > 0) {
                target = newTarget;
                targetDisplay.textContent = target;
                notification.style.display = "none";
                targetInput.value = "";
            } else {
                alert("Masukkan jumlah target yang valid.");
            }
        });

        addBtn.addEventListener("click", function () {
            count++;
            counterDisplay.textContent = count;
            if (navigator.vibrate) { navigator.vibrate(50); }
            if (target > 0 && count === target) {
                notification.style.display = "block";
                if (navigator.vibrate) { navigator.vibrate([100, 50, 100]); }
            }
        });

        resetBtn.addEventListener("click", function () {
            if (confirm("Reset hitungan kembali ke 0?")) {
                count = 0;
                counterDisplay.textContent = count;
                notification.style.display = "none";
            }
        });
    </script>
</body>

</html>
