<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadhan Portal - Kalkulator Zakat</title>
    <link rel="stylesheet" href="style/semua.css">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(15, 81, 50, 0.85), rgba(15, 81, 50, 0.85)),
                url("https://images.unsplash.com/photo-1584551246679-0daf3d275d0f?auto=format&fit=crop&w=1400&q=80");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background: linear-gradient(135deg, #0f5132, #1a5d3b);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border-bottom: 3px solid #d4af37;
            width: 100%;
            box-sizing: border-box;
            z-index: 1000;
        }

        .header-full {
            margin-bottom: 10px;
        }

        .logo {
            background-image: url('img/logo-ramadhan.png');
            background-size: cover;
            background-position: center;
            height: 90px;
            width: 90px;
            border-radius: 50%;
            background-color: white;
            border: 3px solid #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            margin-bottom: 10px;
        }

        .judul-header h2 {
            color: #fff;
            font-size: 28px;
            margin: 0;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .menu {
            display: none;
            font-size: 30px;
            cursor: pointer;
            position: absolute;
            left: 25px;
            top: 25px;
            color: white;
            transition: 0.3s;
            z-index: 2001;
        }

        .button-navigasi {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            transition: all 0.4s ease;
        }

        .nav-item {
            color: #fff;
            border-radius: 25px;
            padding: 10px 25px;
            text-decoration: none;
            border: 1px solid rgba(255, 193, 7, 0.5);
            background: rgba(255, 255, 255, 0.05);
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            background: #ffc107;
            color: #0f5132;
            border-color: #ffc107;
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.3);
            transform: translateY(-2px);
            font-weight: bold;
        }

        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            width: 100%;
            box-sizing: border-box;
            flex: 1;
        }

        .container-zakat {
            background-color: rgba(255, 255, 255, 0.98);
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            color: #333;
            border-radius: 10px;
            padding: 35px;
            border-top: 5px solid #d4af37;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .container-zakat h1 {
            color: #0f5132;
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-style: italic;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #0f5132;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .hitung {
            background: #0f5132;
            color: white;
        }

        .reset {
            background: #d4af37;
            color: white;
        }

        .result {
            margin-top: 30px;
            border-top: 2px dashed #d4af37;
            padding-top: 25px;
        }

        .result-card {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .zakat-box {
            background: linear-gradient(135deg, #d4af37, #ffc107);
            color: #0f5132;
            text-align: center;
            padding: 25px;
            border-radius: 12px;
            margin-top: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        footer {
            width: 100%;
            background: #0a3d25;
            padding: 30px 0;
            text-align: center;
            border-top: 4px solid #d4af37;
            margin-top: auto;
        }

        .footer-inner {
            padding: 0 20px;
            color: rgba(255, 255, 255, 0.7);
        }

        @media(max-width:768px) {
            .menu {
                display: block;
            }

            .button-navigasi {
                display: none;
                flex-direction: column;
                background: #ffffff;
                width: 100%;
                position: absolute;
                top: 100%;
                left: 0;
                padding: 10px 0;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
                z-index: 2000;
                gap: 0;
            }

            .button-navigasi.show {
                display: flex;
            }

            .nav-item {
                color: #0f5132;
                border: none;
                background: transparent;
                border-radius: 0;
                padding: 15px 25px;
                text-align: left;
                border-bottom: 1px solid #eee;
            }

            .nav-item.active {
                background: #e8f5e9;
                color: #0f5132;
                border-left: 5px solid #0f5132;
            }
        }
    </style>
</head>

<body>
    <header class="header-full">
        <div class="menu" onclick="toggleMenu()">☰</div>
        <div class="logo"></div>
        <div class="judul-header">
            <h2>RAMADHAN PORTAL</h2>
        </div>

        <div id="navMenu" class="button-navigasi">
            <a href="index.html" class="nav-item">Doa Puasa</a>
            <a href="zikir.html" class="nav-item">Hitung Zikir</a>
            <a href="zakat.html" class="nav-item active">Kalkulator Zakat</a>
            <a href="imsak.html" class="nav-item">Jadwal Imsakiyah</a>
            <a href="to-do-list.html" class="nav-item">To-Do-List</a>
        </div>
    </header>

    <main>
        <div class="container-zakat">
            <h1>Kalkulator Zakat</h1>
            <p class="subtitle">Bersihkan harta, tenangkan jiwa di bulan mulia</p>

            <div class="form-group">
                <label>Jenis Zakat</label>
                <select id="jenisZakat" onchange="pilihZakat(this.value)">
                    <option value="penghasilan">Zakat Penghasilan</option>
                    <option value="emas">Zakat Emas</option>
                </select>
            </div>

            <div id="formPenghasilan">
                <div class="form-group">
                    <label>Gaji Pokok / Bulan</label>
                    <input type="number" id="gaji" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Penghasilan Lain</label>
                    <input type="number" id="lain" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Harga Emas / Gram (Rp)</label>
                    <input type="number" id="hargaEmas" placeholder="Contoh: 1200000">
                </div>
            </div>

            <div id="formEmas" style="display:none">
                <div class="form-group">
                    <label>Total Emas (gram)</label>
                    <input type="number" id="emas" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Harga Emas / Gram (Rp)</label>
                    <input type="number" id="hargaEmasEmas" placeholder="Contoh: 1200000">
                </div>
            </div>

            <div class="buttons">
                <button class="reset" onclick="resetForm()">Reset</button>
                <button class="hitung" onclick="hitungZakat()">Hitung Zakat</button>
            </div>

            <div class="result">
                <div class="result-card"><span>Total Harta:</span><strong id="total">Rp -</strong></div>
                <div class="result-card"><span>Nisab:</span><strong id="nisab">Rp -</strong></div>
                <div class="result-card"><span>Status:</span><strong id="status">-</strong></div>
                <div class="zakat-box">
                    <p style="margin:0; font-weight:bold;">Zakat yang Harus Dikeluarkan:</p>
                    <h2 id="zakat" style="margin:10px 0 0;">Rp 0</h2>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <p style="margin: 0; font-weight: bold;">&copy; 2026 Ramadhan Portal</p>
            <p style="margin: 5px 0 0; font-size: 0.8rem; opacity: 0.6;">Menemani Ibadah Ramadhan Anda</p>
        </div>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById("navMenu").classList.toggle("show");
        }

        function pilihZakat(val) {
            document.getElementById('formPenghasilan').style.display = (val === 'penghasilan') ? 'block' : 'none';
            document.getElementById('formEmas').style.display = (val === 'emas') ? 'block' : 'none';
        }
    </script>
    <script src="script/zakat.js"></script>
</body>

</html>
