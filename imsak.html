<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadhan Portal - Jadwal Imsakiyah</title>

    <style>
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(15, 81, 50, 0.92), rgba(15, 81, 50, 0.92)),
                url("https://images.unsplash.com/photo-1584551246679-0daf3d275d0f?auto=format&fit=crop&w=1400&q=80");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #0f5132, #1a5d3b);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border-bottom: 3px solid #d4af37;
            width: 100%;
            box-sizing: border-box;
            z-index: 1000;
        }

        .header-full {
            margin-bottom: 10px;
        }

        .logo {
            background-image: url('img/logo-ramadhan.png');
            background-size: cover;
            background-position: center;
            height: 90px;
            width: 90px;
            border-radius: 50%;
            background-color: white;
            border: 3px solid #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            margin-bottom: 10px;
        }

        .judul-header h2 {
            color: #fff;
            font-size: 28px;
            margin: 0;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .menu {
            display: none;
            font-size: 30px;
            cursor: pointer;
            position: absolute;
            left: 25px;
            top: 25px;
            color: white;
            transition: 0.3s;
            z-index: 2001;
        }

        .button-navigasi {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            transition: all 0.4s ease;
        }

        .nav-item {
            color: #fff;
            border-radius: 25px;
            padding: 10px 25px;
            text-decoration: none;
            border: 1px solid rgba(255, 193, 7, 0.5);
            background: rgba(255, 255, 255, 0.05);
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            background: #ffc107;
            color: #0f5132;
            border-color: #ffc107;
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.3);
            transform: translateY(-2px);
        }

        /* Main Content */
        main {
            flex: 1;
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .card-controls {
            background: rgba(255, 255, 255, 0.98);
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            padding: 30px;
            border-radius: 10px;
            border-top: 5px solid #d4af37;
            margin-bottom: 25px;
            color: #333;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        select {
            width: 100%;
            max-width: 350px;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #ddd;
            font-size: 1rem;
            margin-top: 10px;
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 10px;
            overflow-x: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: #333;
            min-width: 700px;
        }

        th {
            background: #0f5132;
            color: #d4af37;
            padding: 15px;
            font-size: 13px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        tr.today {
            background-color: rgba(212, 175, 55, 0.2) !important;
            font-weight: bold;
            border-left: 5px solid #d4af37;
        }

        tbody tr:nth-child(even) {
            background: #fcfcfc;
        }

        /* Footer */
        footer {
            background: #0a3d25;
            padding: 25px 0;
            border-top: 4px solid #d4af37;
            text-align: center;
        }

        .footer-box {
            background: rgba(0, 0, 0, 0.2);
            margin: 0 auto;
            max-width: 400px;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        footer {
            width: 100%;
            background: #0a3d25;
            padding: 30px 0;
            text-align: center;
            border-top: 4px solid #d4af37;
            margin-top: auto;
        }

        .footer-inner {
            padding: 0 20px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Mobile */
        @media (max-width: 768px) {
            .menu {
                display: block;
            }

            .button-navigasi {
                display: none;
                flex-direction: column;
                background: #ffffff;
                width: 100%;
                position: absolute;
                top: 100%;
                left: 0;
                padding: 10px 0;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
                z-index: 2000;
                gap: 0;
            }

            .button-navigasi.show {
                display: flex;
            }

            .nav-item {
                color: #0f5132;
                border: none;
                background: transparent;
                border-radius: 0;
                padding: 15px 25px;
                text-align: left;
                border-bottom: 1px solid #eee;
            }

            .nav-item.active {
                background: #e8f5e9;
                color: #0f5132;
                border-left: 5px solid #0f5132;
                border-bottom: 1px solid #eee;
            }
        }
    </style>
</head>

<body>

    <header class="header-full">
        <div class="menu" onclick="toggleMenu()">☰</div>
        <div class="logo"></div>
        <div class="judul-header">
            <h2>RAMADHAN PORTAL</h2>
        </div>
        <div id="navMenu" class="button-navigasi">
            <a href="index.html" class="nav-item">Doa Puasa</a>
            <a href="zikir.html" class="nav-item">Hitung Zikir</a>
            <a href="zakat.html" class="nav-item">Kalkulator Zakat</a>
            <a href="imsak.html" class="nav-item active">Jadwal Imsakiyah</a>
            <a href="to-do-list.html" class="nav-item">To-Do-List</a>
        </div>
    </header>

    <main>
        <section class="card-controls">
            <h3 id="display-bulan" style="margin-top:0; color:#0f5132;">Jadwal Imsakiyah 2026</h3>
            <label for="kota" style="font-weight:600;">Pilih Lokasi Kota Anda</label><br>
            <select id="kota">
                <option value="">-- Pilih Kota --</option>
                <optgroup label="Jawa">
                    <option value="1301">Jakarta</option>
                    <option value="1219">Bandung</option>
                    <option value="1635">Surabaya</option>
                    <option value="1505">Semarang</option>
                    <option value="1503">Yogyakarta</option>
                </optgroup>
                <optgroup label="Sumatera">
                    <option value="0201">Medan</option>
                    <option value="0601">Palembang</option>
                    <option value="0310">Padang</option>
                </optgroup>
                <optgroup label="Sulawesi & Lainnya">
                    <option value="3001">Makassar</option>
                    <option value="3101">Manado</option>
                    <option value="5101">Denpasar</option>
                </optgroup>
            </select>

            <div id="status-container" style="margin-top: 15px; font-size: 14px;">
                <p id="loading" style="display:none; color:#0f5132; font-weight:bold;">Memproses data...</p>
                <p id="error" style="color:#b91c1c;"></p>
            </div>
        </section>

        <section class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>TANGGAL</th>
                        <th>IMSAK</th>
                        <th>SUBUH</th>
                        <th>DZUHUR</th>
                        <th>ASHAR</th>
                        <th>MAGHRIB</th>
                        <th>ISYA</th>
                    </tr>
                </thead>
                <tbody id="jadwal-body">
                    <tr>
                        <td colspan="7" style="padding:40px; color:#888;">Silakan tentukan kota untuk melihat jadwal.
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <div class="footer-inner">
            <p style="margin: 0; font-weight: bold;">&copy; 2026 Ramadhan Portal</p>
            <p style="margin: 5px 0 0; font-size: 0.8rem; opacity: 0.6;">Menemani Ibadah Ramadhan Anda</p>
        </div>
    </footer>

    <script>
        const kotaSelect = document.getElementById("kota");
        const tbody = document.getElementById("jadwal-body");
        const loading = document.getElementById("loading");
        const error = document.getElementById("error");

        const now = new Date();
        const tahun = now.getFullYear();
        const bulan = now.getMonth() + 1;

        // Teks header card
        document.getElementById("display-bulan").textContent = `Ramadhan 1447 H / ${tahun}`;

        function toggleMenu() {
            const nav = document.getElementById("navMenu");
            nav.classList.toggle("show");
        }

        async function loadJadwal() {
            const kota = kotaSelect.value;

            if (!kota) {
                tbody.innerHTML = `<tr><td colspan="7" style="padding: 2rem; color: #888;">Silakan pilih kota untuk melihat jadwal</td></tr>`;
                return;
            }

            loading.style.display = "block";
            error.textContent = "";
            tbody.innerHTML = "";

            try {
                const response = await fetch(`https://api.myquran.com/v2/sholat/jadwal/${kota}/${tahun}/${bulan}`);
                const data = await response.json();

                if (data.status) {
                    renderTable(data.data.jadwal);
                } else {
                    throw new Error();
                }
            } catch (err) {
                error.textContent = "Gagal memuat data. Periksa koneksi internet Anda.";
                tbody.innerHTML = `<tr><td colspan="7" style="color:#b91c1c; padding:20px;">Terjadi kesalahan saat mengambil data API.</td></tr>`;
            } finally {
                loading.style.display = "none";
            }
        }

        function renderTable(jadwal) {
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth() + 1).padStart(2, '0');
            const d = String(today.getDate()).padStart(2, '0');
            const todayStr = `${y}-${m}-${d}`;

            jadwal.forEach(item => {
                const tr = document.createElement("tr");

                // Highlight Baris
                if (item.date === todayStr) {
                    tr.classList.add("today");
                }

                tr.innerHTML = `
                    <td>${item.tanggal}</td>
                    <td style="color:#0f5132; font-weight:bold;">${item.imsak}</td>
                    <td>${item.subuh}</td>
                    <td>${item.dzuhur}</td>
                    <td>${item.ashar}</td>
                    <td style="color:#b91c1c; font-weight:bold;">${item.maghrib}</td>
                    <td>${item.isya}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        kotaSelect.addEventListener("change", loadJadwal);
    </script>
</body>

</html>
